<!DOCTYPE html>
<html>
<head>
    <title>Factorial Calculator</title>
    <style>
        .container {
            margin: 20px;
            padding: 20px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }
        .form-group {
            margin: 10px 0;
        }
        input[type="number"] {
            width: 100px;
            padding: 5px;
        }
        input[type="submit"] {
            margin-top: 10px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Factorial Calculator</h2>
        <form action="factorial" method="post">
            <div class="form-group">
                Enter a number:
                <input type="number" name="number" min="0" max="20" required>
                <small>(Max: 20)</small>
            </div>
            <input type="submit" value="Calculate Factorial">
        </form>
    </div>
</body>
</html>
